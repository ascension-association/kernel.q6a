# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-radxa-bsp"
BBFILE_PATTERN_meta-radxa-bsp = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-radxa-bsp = "6"

LAYERDEPENDS_meta-radxa-bsp = "core qcom"
LAYERSERIES_COMPAT_meta-radxa-bsp = "wrynose"
